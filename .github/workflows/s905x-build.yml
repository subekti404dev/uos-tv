name: S905X SD Card Image Build

# Build complete UOS TV SD card image for Amlogic S905X set-top boxes.
# Triggered manually via Actions tab or on main pushes to relevant paths.

on:
  workflow_dispatch:
    inputs:
      board:
        description: 'Target board (b860h, hg680p, or all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - b860h
          - hg680p
      nocache:
        description: 'Skip caches (force rebuild)'
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - 'scripts/bootstrap-s905x.sh'
      - 'scripts/build-s905x-wifi.sh'
      - 'configs/services.d/wifid.yaml'
      - 'configs/dts/**'
      - 'Dockerfile.cross'
      - '.github/workflows/s905x-build.yml'

jobs:
  # ── Phase 1: Rust cross-compile ──
  rust-cross:
    name: Rust ARM64 Cross-Compile
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates
          shared-key: s905x
          cache-targets: true

      - name: Build cross-compile Docker image
        run: docker build -t uos-builder -f Dockerfile.cross .

      - name: Cross-compile workspace
        run: |
          docker run --rm -v "$PWD:/work" uos-builder \
            cargo build --release --target aarch64-unknown-linux-musl \
            --workspace --exclude lumind --exclude audiod --exclude inputd

      - name: Upload ARM64 binaries
        uses: actions/upload-artifact@v4
        with:
          name: rust-arm64-binaries
          path: |
            target/aarch64-unknown-linux-musl/release/inis
            target/aarch64-unknown-linux-musl/release/monitord
            target/aarch64-unknown-linux-musl/release/stardustd
            target/aarch64-unknown-linux-musl/release/lunad
            target/aarch64-unknown-linux-musl/release/lumind
            target/aarch64-unknown-linux-musl/release/netmd
            target/aarch64-unknown-linux-musl/release/wifid
            target/aarch64-unknown-linux-musl/release/notifd
            target/aarch64-unknown-linux-musl/release/otad
            target/aarch64-unknown-linux-musl/release/pkgd
            target/aarch64-unknown-linux-musl/release/logd
            target/aarch64-unknown-linux-musl/release/dispald
            target/aarch64-unknown-linux-musl/release/devmand
            target/aarch64-unknown-linux-musl/release/powermand
            target/aarch64-unknown-linux-musl/release/casync-rs
            target/aarch64-unknown-linux-musl/release/rauc-rs
            target/aarch64-unknown-linux-musl/release/update-verify
          retention-days: 7

  # ── Phase 2: Kernel + WiFi + rootfs + image ──
  s905x-image:
    name: S905X SD Card Image
    runs-on: ubuntu-latest
    needs: rust-cross
    timeout-minutes: 90
    env:
      BOARD: ${{ inputs.board || 'all' }}
      PROJECT_DIR: ${{ github.workspace }}
      TARGET_DIR: build/s905x
      KERNEL_DIR: build/s905x/kernel
      ROOTFS_DIR: build/s905x/rootfs
      DTB: meson-gxl-s905x-p212
      KERNEL_VERSION: "6.6"
      NOCACHE: ${{ inputs.nocache || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download ARM64 binaries
        uses: actions/download-artifact@v4
        with:
          name: rust-arm64-binaries
          path: target/aarch64-unknown-linux-musl/release/

      - name: Make binaries executable
        run: chmod +x target/aarch64-unknown-linux-musl/release/*

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bc flex bison build-essential \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            libssl-dev libncurses-dev libelf-dev \
            device-tree-compiler u-boot-tools \
            parted dosfstools e2fsprogs mtools \
            curl wget jq pigz

      - name: Verify cross-compiler
        run: |
          aarch64-linux-gnu-gcc --version
          aarch64-linux-gnu-ld --version | head -1
          dtc --version | head -1

      # ═══════════════════════════════════════════════
      # CACHE: Kernel source + build artifacts
      # ═══════════════════════════════════════════════
      - name: Compute kernel cache key
        id: kernel-cache-key
        run: |
          # Hash the kernel config commands + this workflow + kernel version
          HASH=$(sha256sum "$PROJECT_DIR/.github/workflows/s905x-build.yml" | cut -c1-12)
          echo "key=linux-s905x-v6.6-${HASH}" >> "$GITHUB_OUTPUT"

      - name: Restore kernel cache
        if: env.NOCACHE != 'true'
        id: kernel-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            build/s905x/kernel
          key: ${{ steps.kernel-cache-key.outputs.key }}
          restore-keys: |
            linux-s905x-v6.6-

      - name: Clone Linux kernel (6.6)
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: |
          rm -rf "$KERNEL_DIR"
          git clone --depth=1 --branch v6.6 \
            https://github.com/torvalds/linux.git "$KERNEL_DIR"

      # ═══════════════════════════════════════════════
      # CACHE: Alpine rootfs tarball
      # ═══════════════════════════════════════════════
      - name: Restore Alpine rootfs cache
        if: env.NOCACHE != 'true'
        id: alpine-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/alpine-rootfs.tar.gz
          key: alpine-minirootfs-3.21-aarch64

      - name: Download Alpine rootfs
        if: steps.alpine-cache.outputs.cache-hit != 'true'
        run: |
          curl -fSL \
            "https://dl-cdn.alpinelinux.org/alpine/v3.21/releases/aarch64/alpine-minirootfs-3.21.0-aarch64.tar.gz" \
            -o /tmp/alpine-rootfs.tar.gz

      # ═══════════════════════════════════════════════
      # CONFIGURE + BUILD KERNEL (skip if cache hit)
      # ═══════════════════════════════════════════════
      - name: Configure kernel
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: |
          cd "$KERNEL_DIR"
          make ARCH=arm64 defconfig
          ./scripts/config -e ARCH_MESON
          ./scripts/config -d ARCH_MEDIATEK
          ./scripts/config -e DRM
          ./scripts/config -e DRM_MESON
          ./scripts/config -e DRM_HDMI
          ./scripts/config -e DRM_LIMA
          ./scripts/config -d DRM_PANFROST
          ./scripts/config -e DRM_DW_HDMI
          ./scripts/config -e DRM_DW_HDMI_AHB_AUDIO
          ./scripts/config -e DRM_DISPLAY_CONNECTOR
          ./scripts/config -e USB_XHCI_HCD
          ./scripts/config -e USB_DWC2
          ./scripts/config -e MMC
          ./scripts/config -e MMC_BLOCK
          ./scripts/config -e MMC_MESON_GX
          ./scripts/config -e STMMAC_ETH
          ./scripts/config -e MESON_GXL_PHY
          ./scripts/config -e CFG80211
          ./scripts/config -e MAC80211
          ./scripts/config -e WLAN
          ./scripts/config -e WEXT_CORE
          ./scripts/config -e WEXT_PROC
          ./scripts/config -e RFKILL
          ./scripts/config -e MMC_SDIO
          ./scripts/config -m RTL8723BS
          ./scripts/config -m BRCMFMAC
          ./scripts/config -m BRCMUTIL
          ./scripts/config -e CRYPTO_AES
          ./scripts/config -e CRYPTO_CCM
          ./scripts/config -e CRYPTO_GCM
          ./scripts/config -e CRYPTO_SHA256
          ./scripts/config -e CRYPTO_ARC4
          ./scripts/config -e CRYPTO_ECB
          ./scripts/config -e EXT4_FS
          ./scripts/config -e EXT2_FS
          ./scripts/config -e VFAT_FS
          ./scripts/config -e TMPFS
          ./scripts/config -e OF
          ./scripts/config -e OF_OVERLAY
          ./scripts/config --set-val NR_CPUS 4
          ./scripts/config --set-val HZ 250
          # Disable -Werror so out-of-tree WiFi drivers compile
          ./scripts/config -d WERROR
          make ARCH=arm64 olddefconfig

      - name: Build kernel (Image + modules)
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: |
          cd "$KERNEL_DIR"
          NPROC=$(nproc)
          echo "Building with -j${NPROC}..."
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j${NPROC} Image 2>&1 | tail -30
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j${NPROC} modules 2>&1 | tail -30
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            amlogic/meson-gxl-s905x-p212.dtb 2>&1 | tail -5

      - name: Save kernel cache
        if: env.NOCACHE != 'true' && steps.kernel-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            build/s905x/kernel
          key: ${{ steps.kernel-cache-key.outputs.key }}

      - name: Save Alpine rootfs cache
        if: env.NOCACHE != 'true' && steps.alpine-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/alpine-rootfs.tar.gz
          key: alpine-minirootfs-3.21-aarch64

      # ═══════════════════════════════════════════════
      # POST-BUILD STEPS (always run)
      # ═══════════════════════════════════════════════
      - name: Verify kernel artifacts
        run: |
          echo "=== Kernel Image ==="
          ls -lh "$KERNEL_DIR/arch/arm64/boot/Image"
          file "$KERNEL_DIR/arch/arm64/boot/Image"
          echo "=== DTB ==="
          ls -lh "$KERNEL_DIR/arch/arm64/boot/dts/amlogic/$DTB.dtb"

      - name: Install kernel modules
        run: |
          cd "$KERNEL_DIR"
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            INSTALL_MOD_PATH="$GITHUB_WORKSPACE/$ROOTFS_DIR" modules_install
          KVER=$(cat include/config/kernel.release)
          echo "KERNEL_VERSION_OUT=$KVER" >> "$GITHUB_ENV"
          echo "Kernel: $KVER"

      - name: Apply DTS overlay (disable BT)
        continue-on-error: true
        run: |
          DTS_AML="$KERNEL_DIR/arch/arm64/boot/dts/amlogic"
          cd "$DTS_AML"
          dtc -@ -I dts -O dtb -o uos-stb.dtbo \
            "$PROJECT_DIR/configs/dts/b860h-hg680p-wifi.dtso" 2>/dev/null || true
          if [ -f uos-stb.dtbo ] && fdtoverlay -i "$DTB.dtb" \
              -o "$DTB-uos.dtb" uos-stb.dtbo 2>/dev/null; then
            echo "Patched DTB created"
            ls -lh "$DTB-uos.dtb"
          else
            echo "Overlay skipped — using stock DTB"
            cp "$DTB.dtb" "$DTB-uos.dtb"
          fi

      - name: Build WiFi drivers
        continue-on-error: true  # Out-of-tree RTL drivers need target hardware
        run: |
          if [ "$BOARD" = "all" ]; then
            "$PROJECT_DIR/scripts/build-s905x-wifi.sh" --all \
              --kernel "$KERNEL_DIR" --target "$TARGET_DIR" 2>&1 | tail -15 || true
          elif [ "$BOARD" = "b860h" ]; then
            "$PROJECT_DIR/scripts/build-s905x-wifi.sh" --chip rtl8189es \
              --kernel "$KERNEL_DIR" --target "$TARGET_DIR" 2>&1 | tail -15 || true
          else
            "$PROJECT_DIR/scripts/build-s905x-wifi.sh" --chip rtl8189fs \
              --kernel "$KERNEL_DIR" --target "$TARGET_DIR" 2>&1 | tail -15 || true
          fi
          echo "NOTE: WiFi modules may need rebuild on target device."

      - name: Build rootfs (Alpine)
        run: |
          mkdir -p "$ROOTFS_DIR"
          tar xzf /tmp/alpine-rootfs.tar.gz -C "$ROOTFS_DIR"
          # Alpine tarball preserves root ownership — fix for CI runner
          sudo chown -R "$(id -u):$(id -g)" "$ROOTFS_DIR"

          mkdir -p "$ROOTFS_DIR/usr/bin" "$ROOTFS_DIR/sbin"
          BIN_DIR="target/aarch64-unknown-linux-musl/release"
          for bin in inis monitord stardustd lunad lumind netmd wifid \
                   notifd otad pkgd logd dispald devmand powermand; do
            [ -f "$BIN_DIR/$bin" ] && cp "$BIN_DIR/$bin" "$ROOTFS_DIR/usr/bin/"
          done
          cp "$BIN_DIR/inis" "$ROOTFS_DIR/sbin/init"

          mkdir -p "$ROOTFS_DIR/usr/share/uos/services.d"
          cp configs/services.d/*.yaml "$ROOTFS_DIR/usr/share/uos/services.d/"

          mkdir -p "$ROOTFS_DIR/var/www/luna"
          cp -r luna/* "$ROOTFS_DIR/var/www/luna/"

          mkdir -p "$ROOTFS_DIR/lib/firmware/rtlwifi" "$ROOTFS_DIR/lib/firmware/brcm"
          if [ -d "$TARGET_DIR/firmware" ]; then
            cp -r "$TARGET_DIR/firmware"/* "$ROOTFS_DIR/lib/firmware/" 2>/dev/null || true
          fi

          KVER=$(cat "$KERNEL_DIR/include/config/kernel.release")
          MOD_DEST="$ROOTFS_DIR/lib/modules/$KVER/extra"
          mkdir -p "$MOD_DEST"
          if [ -d "$TARGET_DIR/wifi-drivers" ]; then
            find "$TARGET_DIR/wifi-drivers" -name "*.ko" -exec cp {} "$MOD_DEST/" \;
          fi

          depmod -b "$ROOTFS_DIR" "$KVER" 2>/dev/null || true

          mkdir -p "$ROOTFS_DIR/etc/wpa_supplicant"
          printf 'ctrl_interface=/var/run/wpa_supplicant\nupdate_config=1\ncountry=ID\n' \
            > "$ROOTFS_DIR/etc/wpa_supplicant/wpa_supplicant.conf"

          mkdir -p "$ROOTFS_DIR/boot"
          printf 'TIMEOUT 30\nDEFAULT uos-tv\n\nLABEL uos-tv\n  MENU LABEL UOS TV (S905X)\n  LINUX /Image\n  FDT /meson-gxl-s905x-p212-uos.dtb\n  APPEND console=ttyAML0,115200 root=/dev/mmcblk0p2 rw rootfstype=ext4 init=/sbin/init uos.console=ttyAML0\n\nLABEL uos-tv-fallback\n  MENU LABEL UOS TV (fallback)\n  LINUX /Image\n  FDT /meson-gxl-s905x-p212.dtb\n  APPEND console=ttyAML0,115200 root=/dev/mmcblk0p2 rw rootfstype=ext4 init=/sbin/init\n' \
            > "$ROOTFS_DIR/boot/extlinux.conf"

          echo "Rootfs built: $(du -sh "$ROOTFS_DIR" | cut -f1)"

      - name: Create SD card image
        run: |
          OUTPUT_DIR="$TARGET_DIR/output"
          mkdir -p "$OUTPUT_DIR"
          IMG="$OUTPUT_DIR/uos-tv-s905x-${BOARD}.img"
          IMG_SIZE_MB=4096
          BOOT_SIZE=256

          echo "Creating ${IMG_SIZE_MB}MB image..."
          dd if=/dev/zero of="$IMG" bs=1M count="$IMG_SIZE_MB" status=none

          printf 'label: dos\nunit: sectors\n1 : start=2048, size=%d, type=c\n2 : start=%d, type=83\n' \
            $((BOOT_SIZE * 2048)) $((BOOT_SIZE * 2048 + 2048)) | sfdisk "$IMG"

          LOOP=$(sudo losetup -fP --show "$IMG")
          sudo mkfs.vfat -F32 "${LOOP}p1"
          sudo mkfs.ext4 -F "${LOOP}p2"

          TMPMNT=$(mktemp -d)
          sudo mount "${LOOP}p1" "$TMPMNT"
          sudo cp "$KERNEL_DIR/arch/arm64/boot/Image" "$TMPMNT/"
          sudo cp "$KERNEL_DIR/arch/arm64/boot/dts/amlogic/$DTB.dtb" "$TMPMNT/"
          sudo cp "$KERNEL_DIR/arch/arm64/boot/dts/amlogic/$DTB-uos.dtb" "$TMPMNT/" 2>/dev/null || true
          sudo cp "$ROOTFS_DIR/boot/extlinux.conf" "$TMPMNT/" 2>/dev/null || true
          sudo umount "$TMPMNT"

          sudo mount "${LOOP}p2" "$TMPMNT"
          sudo cp -a "$ROOTFS_DIR/"* "$TMPMNT/"
          sudo umount "$TMPMNT"

          sudo losetup -d "$LOOP"
          rmdir "$TMPMNT"

          echo "=== Image created ==="
          ls -lh "$IMG"
          echo "IMG_PATH=$IMG" >> "$GITHUB_ENV"

      - name: Upload SD card image
        uses: actions/upload-artifact@v4
        with:
          name: uos-tv-s905x-${{ env.BOARD }}
          path: build/s905x/output/uos-tv-s905x-*.img
          retention-days: 30
          compression-level: 9
