name: cog
description: "WPE WebKit Cog — Luna UI web renderer"
binary: /usr/bin/cog
args:
  - "--platform=drm"
  - "file:///usr/share/uos/luna/index.html"
env:
  - "WEBKIT_FORCE_SANDBOX=0"
  - "COG_PLATFORM=drm"
dependencies:
  - stardust
  - dispald
  - lumind
restart: always
restart_delay_ms: 2000
max_crash_count: 3
crash_window_secs: 30
critical: false
startup_timeout_secs: 15
health_check: process
