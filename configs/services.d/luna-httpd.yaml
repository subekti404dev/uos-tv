name: luna-httpd
description: "Luna UI static file server"
binary: /usr/bin/lunad
args:
  - "--root"
  - "/var/www/luna"
  - "--port"
  - "8080"
dependencies:
  - stardust
restart: always
restart_delay_ms: 3000
max_crash_count: 5
crash_window_secs: 30
critical: false
startup_timeout_secs: 5
health_check: process
