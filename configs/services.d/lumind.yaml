name: lumind
description: "Lumina Wayland compositor — display server"
binary: /usr/bin/lumind
args:
  - "--tty"
  - "7"
env:
  - "LUMIND_BACKEND=drm"
  - "WAYLAND_DISPLAY=wayland-0"
  - "LUNA_URL=file:///usr/share/uos/luna/index.html"
dependencies:
  - stardust
  - dispald
  - inputd
restart: always
restart_delay_ms: 2000
max_crash_count: 3
crash_window_secs: 60
critical: false  # Headless/QEMU-safe; real HW uses Cog DRM
startup_timeout_secs: 20
health_check: process
